services:
  backend:
    image: ghcr.io/bangsmackpow/abstract-etl-backend:latest
    pull_policy: always
    container_name: abstract_backend
    restart: unless-stopped
    ports:
      - '3003:3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_PATH: /app/data/sqlite.db
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${POCKETBASE_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${POCKETBASE_ADMIN_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      AI_PROVIDER: ${AI_PROVIDER:-openrouter}
      AI_MODEL: ${AI_MODEL:-google/gemini-flash-1.5-8b}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      APP_URL: ${APP_URL:-https://abstract.builtnetworks.com}
    volumes:
      - abstract_db_data:/app/data
      - backups_data:/app/backups
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://localhost:3001/api/health'').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - abstract_net

  frontend:
    image: ghcr.io/bangsmackpow/abstract-etl-frontend:latest
    pull_policy: always
    container_name: abstract_frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - abstract_net

networks:
  abstract_net:
    driver: bridge

volumes:
  abstract_db_data:
    driver: local
  backups_data:
    driver: local
